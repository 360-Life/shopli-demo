<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shopli — Simple goods, simply delivered</title>
<style>
  :root{--bg:#fafaf8;--ink:#1a1a1a;--accent:#2b6cb0;--muted:#6b6b6b;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink);}
  header{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;border-bottom:1px solid #eee;}
  header a{color:var(--ink);text-decoration:none;font-weight:600;}
  nav a{margin-left:24px;color:var(--muted);}
  .hero{padding:90px 40px;text-align:center;}
  .hero h1{font-size:2.6rem;margin-bottom:10px;}
  .hero p{color:var(--muted);font-size:1.1rem;margin-bottom:30px;}
  .btn{background:var(--accent);color:#fff;padding:12px 26px;border-radius:6px;text-decoration:none;font-weight:600;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:24px;padding:40px;max-width:1100px;margin:0 auto;}
  .card{background:#fff;border:1px solid #eee;border-radius:10px;overflow:hidden;}
  .card img{width:100%;height:160px;object-fit:cover;}
  .card .body{padding:14px;}
  .card h3{margin:0 0 6px;font-size:1rem;}
  .card .price{color:var(--accent);font-weight:700;}
  .card button{margin-top:10px;width:100%;padding:8px;border:none;background:var(--ink);color:#fff;border-radius:6px;cursor:pointer;}
  footer{text-align:center;padding:30px;color:var(--muted);font-size:.9rem;}
</style>
</head>
<body>
<header>
  <a href="/">Shopli</a>
  <nav>
    <a href="/cart.html">Cart (<span id="cart-count">0</span>)</a>
    <a href="/login.html">Login</a>
  </nav>
</header>

<section class="hero">
  <h1>Simple goods, simply delivered.</h1>
  <p>A small catalog of things people actually use.</p>
  <a class="btn" href="#products">Shop the catalog</a>
</section>

<main id="products" class="grid"></main>

<footer>Shopli demo store — built for testing, not a real shop.</footer>

<script>
async function loadProducts() {
  const res = await fetch('/api/products');
  const products = await res.json();
  const grid = document.getElementById('products');
  grid.innerHTML = products.map(p => `
    <div class="card">
      <img src="${p.image_url}" alt="${p.name}">
      <div class="body">
        <h3>${p.name}</h3>
        <div class="price">$${p.price.toFixed(2)}</div>
        <button onclick="addToCart(${p.id}, '${p.name.replace(/'/g, "\\'")}', ${p.price})">Add to cart</button>
      </div>
    </div>
  `).join('');
}

function addToCart(id, name, price) {
  const cart = JSON.parse(localStorage.getItem('cart') || '[]');
  const existing = cart.find(i => i.id === id);
  if (existing) existing.quantity += 1;
  else cart.push({ id, name, price, quantity: 1 });
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
}

function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem('cart') || '[]');
  document.getElementById('cart-count').textContent = cart.reduce((s, i) => s + i.quantity, 0);
}

loadProducts();
updateCartCount();
</script>
</body>
</html>
